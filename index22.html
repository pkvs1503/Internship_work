<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="1">
        <fieldset>
            <legend>Personal Information</legend>
            <tr>
            <td><label for="FN">FirstName</label></td>
            <td><input type="text" id="FN" maxlength="20" pattern="[a-zA-Z]+" required>(max 20 char a-z and A-Z)</td>
            <span class="note"></span>
            </tr>
            <br><br>
            <tr>
            <td><label for="LN">LastName</label></td>
            <td><input type="text" id="LN" maxlength="20" pattern="[a-zA-Z]+" required>(max 20 char a-z and A-Z)</td>
            </tr>
            <br><br>
            <tr>
            <td><label for="DOB">Date of Birth</label></td>
            <td><input type="date" id="DOB" required></td>
            </tr>
            <br><br>
            <tr>
            <td><label for="GN">GENDER</label></td>
            <td>
            <select id="GN" required>
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
            </td>
            </tr>
            <br><br>
            <tr>
            <td><label for="EID">EMAIL ID</label></td>
            <td><input type="email" id="EID" required></td>
            </tr>
            <br><br>
            <tr>
            <td><label for="PN">MOBILE NO</label></td>
            <td><input type="tel" id="PN" pattern="[0-9]{10}" required></td>
            </tr>
            <br><br>
            <tr>
            <td><label for="ADDRESS">ADDRESS</label></td>
            <td><textarea id="ADDRESS" rows="4" cols="50" required></textarea></td>
            </tr>   
            <br><br>
            <tr>
            <td><label for="city">CITY</label></td>
            <td><input type="text" id="city" maxlength="20" pattern="[a-zA-Z]+" required></td>
            </tr>
            <br><br>
            <tr>
            <td><label for="PINCODE">PINCODE</label></td>
            <td><input type="text" id="PINCODE" maxlength="6" pattern="[0-9]{6}" required>(6 digit pincode)</td>
            </tr>
            <br><br>
            <tr>
            <td><label for="EMAIL">EMAIL ID</label></td>
            <td><input type="email" id="EMAIL" required></td>
            </tr>
            <br><br>
            <tr>
            <td><label for="state">STATE</label></td>
            <td><input type="text" id="state" maxlength="20" pattern="[a-zA-Z]+" required></td>
            </tr>
            <br><br>
            <tr>
            <td><label for="country">COUNTRY</label></td>
            <td><input type="text" id="country" maxlength="20" pattern="[a-zA-Z]+" required></td>
            </tr>                                       
            <br><br>
            <label for="hobbies">HOBBIES</label>
            <input type="checkbox" name="hobbies" value="Drawing"> Drawing
            <input type="checkbox" name="hobbies" value="Singing"> Singing
            <input type="checkbox" name="hobbies" value="Dancing"> Dancing <br>
            <pre>         <b> <input type="checkbox" name="hobbies" value="Other"> Other <input type="text" name="hobbies" id="other"></pre></b>
            <pre><strong>            sl no Examination           Board                    Percentage               Year of Pass</strong> </pre>
            <label for="qualification">Qualification</label>
            01 <input type="number" id="qualification" required><input type="text" name="Board" id="qualificationBoard">
            <input type="number" name="Percentage" id="qualificationPercentage" required>
            <input type="number" name="YearOfPass" id="qualificationYearOfPass" required><br>
                02 <input type="number" id="qualification2" required><input type="text" name="Board" id="qualificationBoard2">
            <input type="number" name="Percentage" id="qualificationPercentage2" required>
            <input type="number" name="YearOfPass" id="qualificationYearOfPass2" required><br>

        </fieldset>
    </form>
</body>
</html>
