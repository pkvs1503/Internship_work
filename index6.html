<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent {
            height: 1000px;
            background-image: url("https://tse3.mm.bing.net/th/id/OIP.PeyqocaV11bhc-cFt9e63QHaE7?rs=1&pid=ImgDetMain&o=7&rm=3");
            display: flex;
            justify-content: space-evenly;
            align-items: top center;
            background-size: cover;
        }

        #child1, #child2 ,#child3 {
            width: 400px;
            height: 400px;
            border-radius: 20%;
        }
        #child1 img, #child2 img, #child3 img {
            border-radius: 10%;
        }
    </style>

</head>
<body>
    <div id="parent">
        <div id="child1"><img src="https://img.freepik.com/premium-photo/dynamic-vector-illustration-cristiano-ronaldo_812426-153146.jpg" alt="" height="400px" width="400px"></div>
        <div id="child2"><img src="https://cdn.mos.cms.futurecdn.net/7Jd5RrCtgfgWSbVHvz5D9W.jpg" alt="" height="400px" width="400px"></div>
        <div id="child3"><img src="https://i.pinimg.com/736x/05/99/eb/0599eb0ff45f29435f59e9dd213349a3.jpg" alt="" height="400px" width="400px"></div>
    </div>
</body>
</html>
