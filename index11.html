<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Nested unordered list</h3>
    <ul>
        <li>Fruits</li>
        <ul>
            <li>Apples</li>
            <ul>
                <li>Granny Smith</li>
                <li>Gala</li>
                <li>Fuji</li>
            </ul>
            <li>Oranges</li>
                <ul>
                    <li>Nagpur</li>
                    <li>Blood Orange</li>
                    <li>Mandarin</li>
                </ul>
        </ul>
    </ul>
</body>
</html>
