<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #navbar{
            height:100px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background-color: gold;
            
            
        }
        #logo,#menubar{
            height: 100px;
            width:400px;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        #menubar a{
            text-decoration:none;
            color:black;
            padding: 10px 20px;
            font-weight: bolder;
        }
        #menubar a:hover{
            color:white;
        }
        div#content{
            height: 500px;
            display:flex;
            justify-content:space-evenly;
            align-items:center;
            background-color: rgb(180, 172, 172);
        }
        #logo img{
            mix-blend-mode: multiply;
        }
        #box,#box1{
            height: 200px;
            width:200px;
            border-radius: 20%;
            border:1px solid black;
            display:flex;
            justify-content:center;
            align-items:center;
            background-color: white;
            box-shadow: 1px 1px 5px rgb(128, 128, 128);
        }
        
    </style>
</head>
<body>
    <nav id="navbar">
        <div id="logo"><img src="https://tse3.mm.bing.net/th/id/OIP.CukDXSevfNa1B9Z7vMf7yQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" alt="" height="100px" width="200px"></div>
        <div id="menubar">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
            <a href="">Support</a>
        </div>
    </nav>
    <br>
    <div id="content">
        <div id="box"><img src="https://image.coolblue.de/max/500x500/products/2092674" alt="" height="150px" width="150px"></div>
        <div id="box1"><img src="https://rukminim2.flixcart.com/image/832/832/kigbjbk0-0/headphone/p/p/i/mgyh3hn-a-apple-original-imafy8wbdnh4kbkd.jpeg?q=70&crop=false" alt="" height="155px" width="150px"></div>
    </div>
</body>
</html>
